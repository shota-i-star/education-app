<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>メンバー詳細 — AZism 教育進捗管理</title>
  <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "BIZ UDPGothic", "Hiragino Sans", sans-serif; background: #f0f4f8; color: #1a1a2e; font-size: 14px; }
    header { background: #495e9f; color: #fff; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
    header .app-name { font-size: 14px; opacity: 0.85; }
    header .user-info { display: flex; align-items: center; gap: 12px; font-size: 13px; }
    .role-badge { background: #bd3c40; color: #fff; font-size: 11px; padding: 2px 10px; border-radius: 20px; }
    .btn-logout { padding: 5px 14px; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.4); border-radius: 6px; color: #fff; font-size: 12px; cursor: pointer; font-family: "BIZ UDPGothic", sans-serif; transition: background 0.15s; }
    .btn-logout:hover { background: rgba(255,255,255,0.25); }
    main { max-width: 860px; margin: 0 auto; padding: 24px 16px 60px; }
    .breadcrumb { font-size: 12px; color: #6b7280; margin-bottom: 16px; }
    .breadcrumb a { color: #495e9f; text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; }
    .profile-card { background: #fff; border-radius: 12px; border: 1px solid #e5e7eb; padding: 24px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; gap: 20px; }
    .profile-left { display: flex; align-items: center; gap: 20px; }
    .avatar { width: 56px; height: 56px; border-radius: 50%; background: #495e9f; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; flex-shrink: 0; }
    .profile-info h1 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .profile-tags { display: flex; gap: 8px; flex-wrap: wrap; }
    .tag { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 12px; }
    .tag-grade { background: #eef0fa; color: #495e9f; }
    .tag-store { background: #f0f4f8; color: #6b7280; }
    .tag-area { background: #f0f4f8; color: #6b7280; }
    .profile-stats { display: flex; gap: 24px; }
    .stat { text-align: center; }
    .stat .val { font-size: 22px; font-weight: 700; color: #495e9f; }
    .stat .val span { font-size: 13px; font-weight: 400; color: #6b7280; }
    .stat .lbl { font-size: 11px; color: #9ca3af; margin-top: 2px; }
    .section { background: #fff; border-radius: 12px; border: 1px solid #e5e7eb; padding: 20px 24px; margin-bottom: 20px; }
    .section h2 { font-size: 15px; font-weight: 700; margin-bottom: 16px; }
    .bar-label { display: flex; justify-content: space-between; font-size: 13px; color: #6b7280; margin-bottom: 6px; }
    .bar-bg { background: #e5e7eb; border-radius: 99px; height: 8px; }
    .bar-fill { background: #495e9f; border-radius: 99px; height: 8px; }
    hr { border: none; border-top: 1px solid #f0f4f8; margin: 16px 0; }
    .cat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .cat-name { font-size: 13px; font-weight: 700; }
    .cat-meta { font-size: 12px; color: #6b7280; }
    .item-row { padding: 12px 0; border-bottom: 1px solid #f0f4f8; }
    .item-row:last-child { border-bottom: none; }
    .item-name { font-size: 13px; font-weight: 700; margin-bottom: 8px; color: #1a1a2e; }
    .steps { display: flex; gap: 8px; flex-wrap: wrap; }
    .step { padding: 4px 12px; border-radius: 20px; border: 1.5px solid #e5e7eb; font-size: 12px; color: #6b7280; background: #fff; }
    .step.checked { background: #eef0fa; border-color: #495e9f; color: #495e9f; font-weight: 700; }
    .step.checked::before { content: "✓ "; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 8px 12px; border-bottom: 2px solid #e5e7eb; color: #6b7280; font-weight: 700; }
    td { padding: 10px 12px; border-bottom: 1px solid #f0f4f8; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    .pass { color: #2e7d32; font-weight: 700; }
    .fail { color: #bd3c40; }
    .score-high { color: #495e9f; font-weight: 700; }
    .score-low { color: #bd3c40; font-weight: 700; }
    .readonly-note { font-size: 12px; color: #9ca3af; margin-bottom: 12px; }
    .loading-text { text-align: center; padding: 32px; color: #9ca3af; font-size: 13px; }
    .comment-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
    .comment-bubble { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 10px; padding: 14px 16px; }
    .comment-meta { font-size: 11px; color: #9ca3af; margin-bottom: 6px; display: flex; justify-content: space-between; }
    .comment-meta .author { color: #495e9f; font-weight: 700; }
    .comment-text { font-size: 13px; line-height: 1.7; color: #374151; }
    .comment-form { display: flex; flex-direction: column; gap: 10px; }
    .comment-input { width: 100%; padding: 12px 14px; border: 1.5px solid #e5e7eb; border-radius: 8px; font-family: "BIZ UDPGothic", sans-serif; font-size: 13px; color: #1a1a2e; resize: vertical; min-height: 80px; outline: none; }
    .comment-input:focus { border-color: #495e9f; }
    .comment-submit { align-self: flex-end; padding: 8px 24px; background: #495e9f; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-family: "BIZ UDPGothic", sans-serif; cursor: pointer; }
    .comment-submit:hover { background: #3a4d86; }

    /* PDF出力ボタン */
    .btn-pdf { padding: 7px 18px; background: #2e7d32; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-family: "BIZ UDPGothic", sans-serif; cursor: pointer; transition: background 0.15s; }
    .btn-pdf:hover { background: #1b5e20; }

    /* 印刷用ヘッダー（通常は非表示） */
    .print-header { display: none; }

    /* 印刷・PDF出力用スタイル */
    @media print {
      * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      body { background: #fff; font-size: 12px; }
      header { display: none; }
      .breadcrumb { display: none; }
      .btn-pdf { display: none; }
      .readonly-note { display: none; }
      .comment-form { display: none; }
      .section { border: 1px solid #e5e7eb; border-radius: 0; margin-bottom: 12px; padding: 14px 16px; page-break-inside: avoid; }
      .profile-card { border: 1px solid #e5e7eb; border-radius: 0; margin-bottom: 12px; page-break-inside: avoid; }
      main { max-width: 100%; padding: 0; }

      /* 印刷時のみ表示するヘッダー */
      .print-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        padding: 0 0 10px 0;
        border-bottom: 2px solid #495e9f;
        margin-bottom: 14px;
      }
      .print-header .print-title { font-size: 18px; font-weight: 700; color: #1a1a2e; }
      .print-header .print-sub  { font-size: 11px; color: #6b7280; }

      /* プロフィールカードを縦並びに */
      .profile-card { flex-direction: column; align-items: flex-start; gap: 12px; }
      .profile-stats { gap: 32px; }
      .stat .val { font-size: 18px; }

      /* バーをはっきり見せる */
      .bar-bg { height: 6px; }
      .bar-fill { height: 6px; }

      /* テーブル */
      table { font-size: 11px; }
      th, td { padding: 6px 10px; }

      /* ステップタグ */
      .step { font-size: 11px; padding: 2px 8px; }
      .step.checked { background: #eef0fa !important; border-color: #495e9f !important; color: #495e9f !important; }

      /* コメント */
      .comment-bubble { border: 1px solid #e5e7eb; padding: 10px 12px; }
      .comment-meta, .comment-text { font-size: 11px; }
    }
  </style>
</head>
<body>
  <header>
    <span class="app-name">AZism 教育進捗管理</span>
    <div class="user-info">
      <span class="role-badge" id="role-badge">MG</span>
      <span id="header-name">読み込み中...</span>
      <button class="btn-logout" onclick="logout()">ログアウト</button>
    </div>
  </header>

  <main>
    <!-- 印刷時のみ表示するヘッダー -->
    <div class="print-header">
      <div>
        <div class="print-title">メンバー詳細レポート</div>
        <div class="print-sub">AZism 教育進捗管理</div>
      </div>
      <div class="print-sub" id="print-date"></div>
    </div>

    <div class="breadcrumb" style="display:flex;align-items:center;justify-content:space-between">
      <span><a href="manager_dashboard.html">ダッシュボード</a> ＞ メンバー詳細</span>
      <button class="btn-pdf" onclick="printAsPDF()">📄 PDFで出力</button>
    </div>

    <!-- プロフィールカード -->
    <div class="profile-card" id="profile-card">
      <div class="loading-text">読み込み中...</div>
    </div>

    <!-- 進捗チェックリスト -->
    <div class="section">
      <h2>チェック状況</h2>
      <p class="readonly-note">※ この画面は閲覧のみです。チェックの変更はメンバー本人が行います。</p>
      <div id="check-list"><div class="loading-text">読み込み中...</div></div>
    </div>

    <!-- テスト受験履歴 -->
    <div class="section">
      <h2>テスト受験履歴</h2>
      <div id="test-history"><div class="loading-text">読み込み中...</div></div>
    </div>

    <!-- コメント -->
    <div class="section">
      <h2>上司コメント</h2>
      <div class="comment-list" id="comment-list">
        <div class="loading-text">読み込み中...</div>
      </div>
      <div class="comment-form">
        <textarea class="comment-input" id="comment-input" placeholder="コメントを入力してください"></textarea>
        <button class="comment-submit" onclick="submitComment()">コメントを送信</button>
      </div>
    </div>
  </main>

  <script>
    var SUPABASE_URL = 'https://rkclfgpewmjdluwufjng.supabase.co';
    var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJrY2xmZ3Bld21qZGx1d3Vmam5nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2MDIwOTcsImV4cCI6MjA5MTE3ODA5N30.ZoW7JExgrie14EEBgCOipy1QIRHCuzd8KKOS6v37nRg';
    var client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: { persistSession: true }
    });

    // チェック項目の定義（member_top.htmlと合わせる）
    var CHECK_ITEMS = [
      { id: 'grade1_training_phone',    label: '電話対応の基本',   category: '新人研修' },
      { id: 'grade1_training_claim',    label: 'クレーム初期対応', category: '新人研修' },
      { id: 'grade1_azism_team',        label: 'チームワーク',     category: 'AZism共通言語' },
      { id: 'grade1_azism_hospitality', label: 'ホスピタリティ',   category: 'AZism共通言語' }
    ];

    var TARGET_USER_ID = null;
    var CURRENT_USER_NAME = '';

    // ログイン確認
    async function initUser() {
      await new Promise(function(resolve) { setTimeout(resolve, 300); });
      var { data: { session } } = await client.auth.getSession();
      if (!session) { window.location.href = 'login.html'; return; }

      var { data: profiles } = await client
        .from('user_profiles')
        .select('name, role')
        .eq('id', session.user.id)
        .limit(1);

      if (!profiles || profiles.length === 0) { window.location.href = 'login.html'; return; }
      var profile = profiles[0];

      if (profile.role === 'member') { window.location.href = 'member_top.html'; return; }

      document.getElementById('header-name').textContent = profile.name;
      var roleLabels = {
            member:        'メンバー',
            manager:       'MG',
            manager_admin: '全権管理者',
            dept_admin:    '部署管理者'
            };
      document.getElementById('role-badge').textContent = roleLabels[profile.role] || 'MG';
      CURRENT_USER_NAME = profile.name;

      // URLからメンバーIDを取得する
      var params = new URLSearchParams(window.location.search);
      TARGET_USER_ID = params.get('id');

      if (!TARGET_USER_ID) {
        window.location.href = 'manager_dashboard.html';
        return;
      }

      loadMemberDetail();
    }

    async function logout() {
      await client.auth.signOut();
      window.location.href = 'login.html';
    }

    // メンバー詳細データを読み込む
    async function loadMemberDetail() {
      // ① プロフィールを取得する
      var { data: profiles } = await client
        .from('user_profiles')
        .select('name, grade, store, area')
        .eq('id', TARGET_USER_ID)
        .limit(1);

      if (!profiles || profiles.length === 0) {
        window.location.href = 'manager_dashboard.html';
        return;
      }
      var member = profiles[0];

      // ② チェック状況を取得する
    var { data: allSteps } = await client
    .from('check_steps')
    .select('id, item_id');

    var { data: checks } = await client
    .from('check_progress')
    .select('step_id')
    .eq('user_id', TARGET_USER_ID)
    .not('step_id', 'is', null);

    var checkedStepIds = (checks || []).map(function(c) { return c.step_id; });
    var totalSteps = (allSteps || []).length;
    var checkedCount = checkedStepIds.length;
      // ③ テスト結果を取得する
      var { data: results } = await client
        .from('test_results')
        .select('category, grade, score, passed, taken_at')
        .eq('user_id', TARGET_USER_ID)
        .order('taken_at', { ascending: false });

      // ④ 記述式の点数を取得する
      var { data: textScores } = await client
        .from('text_answers')
        .select('score')
        .eq('user_id', TARGET_USER_ID)
        .not('score', 'is', null)
        .limit(1);

      // 進捗率を計算する
        var progress = Math.round(checkedCount / totalSteps * 100);

      // テスト平均点を計算する
      var autoScore = (results && results.length > 0) ? results[0].score : null;
      var descScore = (textScores && textScores.length > 0) ? textScores[0].score : null;
      var totalScore = autoScore !== null
        ? (descScore !== null ? autoScore + descScore : autoScore)
        : null;

      // 画面を描画する
      renderProfile(member, progress, totalScore, results ? results.length : 0);
      renderCheckList(checkedStepIds, member.grade, allSteps || []);
      renderTestHistory(results || []);
      loadComments();
    }

    // プロフィールカードを描画する
    function renderProfile(member, progress, score, testCount) {
      var firstChar = member.name.charAt(0);
      document.getElementById('profile-card').innerHTML =
        '<div class="profile-left">' +
          '<div class="avatar">' + firstChar + '</div>' +
          '<div class="profile-info">' +
            '<h1>' + member.name + '</h1>' +
            '<div class="profile-tags">' +
              '<span class="tag tag-grade">' + member.grade + '等級</span>' +
              '<span class="tag tag-store">' + (member.store || '未設定') + '</span>' +
              '<span class="tag tag-area">' + (member.area || '未設定') + '</span>' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div class="profile-stats">' +
          '<div class="stat"><div class="val">' + progress + '<span>%</span></div><div class="lbl">全体進捗</div></div>' +
          '<div class="stat"><div class="val">' + (score !== null ? score : '－') + '<span>' + (score !== null ? '点' : '') + '</span></div><div class="lbl">テスト点数</div></div>' +
          '<div class="stat"><div class="val">' + testCount + '<span>回</span></div><div class="lbl">受験回数</div></div>' +
        '</div>';
    }

    // チェックリストを描画する
    function renderCheckList(checkedStepIds, grade, allSteps) {
      var categories = {};
      CHECK_ITEMS.forEach(function(item) {
        if (!categories[item.category]) categories[item.category] = [];
        categories[item.category].push(item);
      });

      var html = '';
      var totalChecked = checkedStepIds.length;
      var totalSteps   = allSteps.length;
      var totalProgress = totalSteps > 0 ? Math.round(totalChecked / totalSteps * 100) : 0;

      html += '<div class="bar-label"><span>全体進捗</span><span>' + totalProgress + '%</span></div>';
      html += '<div class="bar-bg" style="margin-bottom:16px"><div class="bar-fill" style="width:' + totalProgress + '%"></div></div>';

      Object.keys(categories).forEach(function(catName, idx) {
        var items = categories[catName];

        // このカテゴリのステップIDを取得する
        var catStepIds = allSteps
          .filter(function(s) {
            return items.some(function(i) {
              // item_idがcheck_itemsのidなので一致するものを探す
              return true; // 全ステップを対象（後で正確なフィルタに改善可能）
            });
          })
          .map(function(s) { return s.id; });

        var catChecked = catStepIds.filter(function(id) {
          return checkedStepIds.indexOf(id) !== -1;
        }).length;

        var catProgress = catStepIds.length > 0
          ? Math.round(catChecked / catStepIds.length * 100)
          : 0;

        if (idx > 0) html += '<hr>';
        html += '<div class="cat-header">' +
          '<span class="cat-name">' + catName + '</span>' +
          '<span class="cat-meta">' + catChecked + ' / ' + catStepIds.length + ' チェック済み</span>' +
        '</div>';
        html += '<div class="bar-bg" style="margin-bottom:12px"><div class="bar-fill" style="width:' + catProgress + '%"></div></div>';

        items.forEach(function(item) {
          var itemSteps = allSteps.filter(function(s) {
            return s.item_id !== undefined;
          });
          html += '<div class="item-row">' +
            '<div class="item-name">' + item.label + '</div>' +
            '<div class="steps">' +
              '<span class="step checked">チェック済み</span>' +
            '</div>' +
          '</div>';
        });
      });

      document.getElementById('check-list').innerHTML = html;
    }

    // テスト受験履歴を描画する
    function renderTestHistory(results) {
      if (results.length === 0) {
        document.getElementById('test-history').innerHTML = '<div class="loading-text">受験履歴がありません</div>';
        return;
      }

      var rows = results.map(function(r) {
        var date = new Date(r.taken_at).toLocaleDateString('ja-JP');
        var scoreClass = r.score >= 80 ? 'score-high' : 'score-low';
        var passText = r.passed
          ? '<span class="pass">合格</span>'
          : '<span class="fail">未合格</span>';
        return '<tr>' +
          '<td>' + r.category + '</td>' +
          '<td>' + r.grade + '等級</td>' +
          '<td>' + date + '</td>' +
          '<td class="' + scoreClass + '">' + r.score + '点</td>' +
          '<td>' + passText + '</td>' +
        '</tr>';
      }).join('');

      document.getElementById('test-history').innerHTML =
        '<table>' +
          '<thead><tr><th>カテゴリ</th><th>等級</th><th>受験日</th><th>点数</th><th>合否</th></tr></thead>' +
          '<tbody>' + rows + '</tbody>' +
        '</table>';
    }

    // コメントを読み込む
    async function loadComments() {
      var { data: comments, error } = await client
        .from('comments')
        .select('author_name, body, created_at')
        .eq('member_id', TARGET_USER_ID)
        .order('created_at', { ascending: false });

      if (error) { console.error('コメント取得エラー:', error.message); return; }

      var list = document.getElementById('comment-list');
      if (!comments || comments.length === 0) {
        list.innerHTML = '<div style="font-size:13px;color:#9ca3af;">まだコメントはありません。</div>';
        return;
      }

      list.innerHTML = comments.map(function(c) {
        var date = new Date(c.created_at).toLocaleDateString('ja-JP');
        return '<div class="comment-bubble">' +
          '<div class="comment-meta">' +
            '<span class="author">' + c.author_name + '</span>' +
            '<span>' + date + '</span>' +
          '</div>' +
          '<div class="comment-text">' + c.body + '</div>' +
        '</div>';
      }).join('');
    }

    // コメントを送信する
    async function submitComment() {
      var text = document.getElementById('comment-input').value.trim();
      if (!text) { alert('コメントを入力してください。'); return; }

      // ログイン中のユーザー情報を取得する
      var { data: { session } } = await client.auth.getSession();
      if (!session) { alert('ログインが必要です。'); return; }

      var { error } = await client
        .from('comments')
        .insert({
          member_id:   TARGET_USER_ID,
          author_id:   session.user.id,
          author_name: CURRENT_USER_NAME,
          body:        text
        });

      if (error) { console.error('コメント送信エラー:', error.message); alert('送信に失敗しました。'); return; }

      document.getElementById('comment-input').value = '';
      loadComments();
    }

    // PDF出力（ブラウザの印刷ダイアログを使用）
    function printAsPDF() {
      var now = new Date();
      var dateStr = now.getFullYear() + '年' +
        (now.getMonth() + 1) + '月' +
        now.getDate() + '日 出力';
      document.getElementById('print-date').textContent = dateStr;
      window.print();
    }

    initUser();
  </script>
</body>
</html>
