<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="image/favicon.png">
  <link rel="apple-touch-icon" href="image/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AZism">
  <meta name="theme-color" content="#495e9f">
  <title>テスト — AZism 教育進捗管理</title>
  <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "BIZ UDPGothic", "Hiragino Sans", sans-serif; background: #f0f4f8; color: #1a1a2e; }
    header { background: #495e9f; color: #fff; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
    header .app-name { font-size: 14px; opacity: 0.85; display: flex; align-items: center; gap: 8px; overflow: visible; }
    header .user-info { display: flex; align-items: center; gap: 12px; font-size: 13px; }
    .grade-badge { background: #bd3c40; color: #fff; font-size: 11px; padding: 2px 10px; border-radius: 20px; }
    .btn-back { padding: 5px 14px; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.4); border-radius: 6px; color: #fff; font-size: 12px; cursor: pointer; font-family: "BIZ UDPGothic", sans-serif; text-decoration: none; display: inline-block; }
    .btn-back:hover { background: rgba(255,255,255,0.25); }
    main { max-width: 680px; margin: 0 auto; padding: 28px 16px 60px; }
    .test-header { margin-bottom: 24px; }
    .test-header .breadcrumb { font-size: 12px; color: #6b7280; margin-bottom: 8px; }
    .test-header h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .test-header .meta { font-size: 13px; color: #6b7280; display: flex; align-items: center; gap: 16px; margin-top: 8px; flex-wrap: wrap; }
    .pass-badge { background: #eef0fa; color: #495e9f; font-size: 12px; padding: 2px 10px; border-radius: 20px; }
    .progress-wrap { margin-bottom: 28px; }
    .progress-info { display: flex; justify-content: space-between; font-size: 12px; color: #6b7280; margin-bottom: 6px; }
    .bar-bg { background: #e5e7eb; border-radius: 99px; height: 6px; }
    .bar-fill { background: #495e9f; border-radius: 99px; height: 6px; transition: width 0.3s; }
    .question-card { background: #fff; border-radius: 12px; border: 1px solid #e5e7eb; margin-bottom: 20px; overflow: hidden; }
    .question-head { background: #f9fafb; border-bottom: 1px solid #e5e7eb; padding: 12px 20px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .q-number { font-size: 13px; font-weight: 500; color: #495e9f; }
    .q-type { font-size: 11px; padding: 2px 8px; border-radius: 20px; }
    .q-point { font-size: 11px; color: #9ca3af; margin-left: auto; }
    .type-choice { background: #eef0fa; color: #495e9f; }
    .type-truefalse { background: #fef3cd; color: #856404; }
    .type-text { background: #e8f5e9; color: #2e7d32; }
    .question-body { padding: 20px; }
    .question-text { font-size: 15px; font-weight: 500; margin-bottom: 16px; line-height: 1.6; white-space: pre-wrap; }
    .choices { display: flex; flex-direction: column; gap: 10px; }
    .choice { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 8px; border: 1.5px solid #e5e7eb; cursor: pointer; font-size: 14px; transition: border-color 0.15s, background 0.15s; }
    .choice:hover { border-color: #495e9f; background: #f5f7ff; }
    .choice input[type="radio"] { accent-color: #495e9f; width: 16px; height: 16px; flex-shrink: 0; }
    .choice.correct { border-color: #2e7d32; background: #e8f5e9; }
    .choice.wrong { border-color: #bd3c40; background: #fdf0f0; }
    .truefalse { display: flex; gap: 12px; }
    .tf-btn { flex: 1; padding: 14px; border-radius: 8px; border: 1.5px solid #e5e7eb; background: #fff; font-size: 22px; cursor: pointer; transition: border-color 0.15s, background 0.15s; display: flex; align-items: center; justify-content: center; gap: 8px; font-family: "BIZ UDPGothic", sans-serif; }
    .tf-btn span { font-size: 14px; font-weight: 500; }
    .tf-btn.maru { color: #bd3c40; }
    .tf-btn.batu { color: #495e9f; }
    .tf-btn.selected-maru { border-color: #bd3c40; background: #fdf0f0; }
    .tf-btn.selected-batu { border-color: #495e9f; background: #eef0fa; }
    .tf-btn.correct { border-color: #2e7d32; background: #e8f5e9; }
    .tf-btn.wrong { border-color: #bd3c40; background: #fdf0f0; }
    .text-input { width: 100%; padding: 12px 14px; border: 1.5px solid #e5e7eb; border-radius: 8px; font-family: "BIZ UDPGothic", sans-serif; font-size: 14px; color: #1a1a2e; resize: vertical; min-height: 100px; transition: border-color 0.15s; outline: none; }
    .text-input:focus { border-color: #495e9f; }
    .text-hint { font-size: 12px; color: #9ca3af; margin-top: 6px; }
    .text-submitted { background: #f9fafb; border: 1.5px solid #e5e7eb; border-radius: 8px; padding: 12px 14px; font-size: 14px; color: #6b7280; line-height: 1.7; white-space: pre-wrap; }
    .submitted-badge { display: inline-block; background: #e8f5e9; color: #2e7d32; font-size: 12px; padding: 2px 10px; border-radius: 20px; margin-bottom: 10px; }
    .score-pending { font-size: 13px; color: #9ca3af; margin-top: 10px; }
    .score-result { font-size: 13px; color: #495e9f; font-weight: 700; margin-top: 10px; }
    .submit-area { text-align: center; margin-top: 8px; }
    .btn-submit { padding: 14px 48px; background: #495e9f; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 500; font-family: "BIZ UDPGothic", sans-serif; cursor: pointer; transition: background 0.2s; }
    .btn-submit:hover { background: #3a4d86; }
    .btn-submit:disabled { background: #9ca3af; cursor: not-allowed; }
    .submit-note { font-size: 12px; color: #9ca3af; margin-top: 10px; }
    .result-card { display: none; background: #fff; border-radius: 12px; border: 1px solid #e5e7eb; padding: 32px; text-align: center; margin-bottom: 24px; }
    .result-card.show { display: block; }
    .result-score { font-size: 48px; font-weight: 700; color: #495e9f; margin-bottom: 8px; }
    .result-score span { font-size: 20px; color: #6b7280; }
    .result-badge { display: inline-block; padding: 6px 24px; border-radius: 20px; font-size: 16px; font-weight: 700; margin-bottom: 16px; }
    .result-badge.passed { background: #e8f5e9; color: #2e7d32; }
    .result-badge.failed { background: #fdf0f0; color: #bd3c40; }
    .result-msg { font-size: 14px; color: #6b7280; line-height: 1.7; }
    .loading { font-size: 13px; color: #9ca3af; margin-top: 8px; text-align: center; }
    .retest-notice { background: #e8f5e9; border-radius: 8px; padding: 16px; text-align: center; font-size: 14px; color: #2e7d32; font-weight: 700; margin-bottom: 24px; }
    .error-box { background: #fdf0f0; border: 1px solid #f5c2c5; color: #bd3c40; border-radius: 8px; padding: 16px; font-size: 14px; text-align: center; }
    @media (max-width: 640px) {
      header { padding: 0 14px; }
      header .app-name { display: none; }
      header .user-info { gap: 8px; }
      .btn-back { padding: 5px 10px; font-size: 11px; }
      main { padding: 16px 12px 60px; }
      .test-header h1 { font-size: 17px; }
      .question-body { padding: 14px; }
      .question-text { font-size: 14px; margin-bottom: 12px; }
      .choice { padding: 12px 14px; font-size: 13px; }
      .truefalse { gap: 10px; }
      .tf-btn { padding: 18px 10px; font-size: 28px; }
      .tf-btn span { font-size: 13px; }
      .btn-submit { width: 100%; padding: 14px; font-size: 14px; }
      .result-score { font-size: 40px; }
    }
  </style>
</head>
<body>
  <header>
    <span class="app-name" style="display:flex;align-items:center;gap:8px;"><img src="image/logo-white.png" alt="" style="height:26px;width:auto;object-fit:contain;filter:brightness(0) invert(1);flex-shrink:0;display:block;">AZism 教育進捗管理</span>
    <div class="user-info">
      <span class="grade-badge" id="grade-badge">－等級</span>
      <span id="header-name">読み込み中...</span>
      <a class="btn-back" href="member_top.html">← 戻る</a>
    </div>
  </header>

  <main id="main-area">
    <div class="test-header">
      <div class="breadcrumb" id="breadcrumb">読み込み中...</div>
      <h1 id="test-title">テスト</h1>
      <div class="meta" id="test-meta"></div>
    </div>

    <div class="retest-notice" id="retest-notice" style="display:none">
      管理者から再試験が許可されました。もう一度挑戦してください！
    </div>

    <div class="result-card" id="result-card">
      <div class="result-score" id="result-score">－<span>点</span></div>
      <div class="result-badge" id="result-badge">－</div>
      <div class="result-msg" id="result-msg"></div>
    </div>

    <div class="progress-wrap" id="progress-wrap" style="display:none">
      <div class="progress-info"><span>回答状況</span><span id="progress-text">0 / 0 回答済み</span></div>
      <div class="bar-bg"><div class="bar-fill" id="progress-bar" style="width:0%"></div></div>
    </div>

    <div id="questions-area"></div>

    <div class="submit-area" id="submit-area" style="display:none">
      <button class="btn-submit" id="btn-submit" onclick="submitTest()">テストを提出する</button>
      <div class="submit-note">提出後は回答を変更できません</div>
      <div class="loading" id="loading" style="display:none">保存中...</div>
    </div>
  </main>

  <script>
    var SUPABASE_URL = 'https://rkclfgpewmjdluwufjng.supabase.co';
    var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJrY2xmZ3Bld21qZGx1d3Vmam5nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2MDIwOTcsImV4cCI6MjA5MTE3ODA5N30.ZoW7JExgrie14EEBgCOipy1QIRHCuzd8KKOS6v37nRg';
    var client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: { persistSession: true }
    });

    var CURRENT_USER = null;
    var TEST_SET  = null;          // test_sets の行
    var CATEGORY  = null;          // categories の行
    var QUESTIONS = [];            // [{ q, choices:[{id,body,is_correct}] }]
    var ANSWERS   = {};            // { question_id: 値 }
    var SUBMITTED = false;         // 既に提出済み（再試験不可）
    var IS_PENDING_GRADING = false; // 記述式の採点待ち中（再受験不可）

    function getParam(name) {
      var m = new RegExp('[?&]' + name + '=([^&]+)').exec(location.search);
      return m ? decodeURIComponent(m[1]) : null;
    }

    function showError(msg) {
      document.getElementById('main-area').innerHTML =
        '<div class="error-box">' + msg + '</div>' +
        '<div style="text-align:center;margin-top:16px"><a class="btn-back" style="background:#495e9f" href="member_top.html">メンバー画面に戻る</a></div>';
    }

    // ============================================
    // ログイン確認
    // ============================================
    async function initUser() {
      await new Promise(function(resolve) { setTimeout(resolve, 300); });
      var { data: { session } } = await client.auth.getSession();
      if (!session) { window.location.href = 'login.html'; return; }

      var { data: profiles } = await client
        .from('user_profiles')
        .select('name, grade, role')
        .eq('id', session.user.id)
        .limit(1);

      if (!profiles || profiles.length === 0) { window.location.href = 'login.html'; return; }

      var profile = profiles[0];
      CURRENT_USER = session.user.id;
      document.getElementById('header-name').textContent = profile.name;
      document.getElementById('grade-badge').textContent = profile.grade + '等級';

      loadTest();
    }

    // ============================================
    // 問題集を読み込む
    // ============================================
    async function loadTest() {
      var setId = parseInt(getParam('set_id'));
      if (!setId) { showError('URLに問題集IDがありません（?set_id=xxx）。'); return; }

      var { data: setRows, error: setErr } = await client
        .from('test_sets').select('id, name, category_id, grade, pass_score')
        .eq('id', setId).limit(1);
      if (setErr || !setRows || setRows.length === 0) {
        showError('問題集が見つかりません。'); return;
      }
      TEST_SET = setRows[0];

      var { data: catRows } = await client
        .from('categories').select('id, name').eq('id', TEST_SET.category_id).limit(1);
      CATEGORY = (catRows && catRows[0]) ? catRows[0] : { id: TEST_SET.category_id, name: '－' };

      var { data: qRows } = await client
        .from('test_questions').select('id, question, type, point')
        .eq('test_set_id', setId).order('id');

      if (!qRows || qRows.length === 0) {
        showError('この問題集にはまだ問題が登録されていません。'); return;
      }

      var qIds = qRows.map(function(q) { return q.id; });
      var { data: cRows } = await client
        .from('test_choices').select('id, question_id, body, is_correct')
        .in('question_id', qIds).order('id');

      QUESTIONS = qRows.map(function(q) {
        return {
          id: q.id, question: q.question, type: q.type, point: q.point || 0,
          choices: (cRows || []).filter(function(c) { return c.question_id === q.id; })
        };
      });

      // ヘッダー情報を描画
      document.getElementById('breadcrumb').textContent = CATEGORY.name + ' ＞ ' + TEST_SET.grade + '等級 ＞ テスト';
      document.getElementById('test-title').textContent = TEST_SET.name;
      var totalPoints = QUESTIONS.reduce(function(s, q) { return s + q.point; }, 0);
      document.getElementById('test-meta').innerHTML =
        '<span>全' + QUESTIONS.length + '問</span>' +
        '<span>合計配点：' + totalPoints + '点</span>' +
        '<span class="pass-badge">合格基準：' + TEST_SET.pass_score + '点以上</span>';

      // 提出済みチェック
      var { data: results } = await client
        .from('test_results').select('id, score, passed, answers, taken_at')
        .eq('user_id', CURRENT_USER).eq('test_set_id', setId)
        .order('taken_at', { ascending: false }).limit(1);
      var latest = (results && results[0]) ? results[0] : null;

      // 採点中チェック：未採点の記述式回答が1件でもあれば採点中
      var { data: ungradedTexts } = await client
        .from('text_answers').select('id')
        .eq('user_id', CURRENT_USER).eq('test_set_id', setId)
        .is('score', null).limit(1);
      IS_PENDING_GRADING = !!(ungradedTexts && ungradedTexts.length > 0);

      if (latest || IS_PENDING_GRADING) {
        // 採点中は再試験許可があっても絶対に受験不可
        var canRetest = IS_PENDING_GRADING ? false : await checkRetestPermission(setId);
        if (canRetest) {
          document.getElementById('retest-notice').style.display = 'block';
          renderQuestions(false);
        } else {
          SUBMITTED = true;
          renderQuestions(true);
          if (latest) {
            await showPastResult(latest);
          } else if (IS_PENDING_GRADING) {
            // 採点中だが test_results が無い稀なケース：採点中表示のみ
            renderResult(0, false, true);
            document.getElementById('progress-wrap').style.display = 'none';
            document.getElementById('submit-area').style.display = 'none';
          }
        }
      } else {
        renderQuestions(false);
      }
    }

    // ============================================
    // 再試験許可を確認する
    // ============================================
    async function checkRetestPermission(setId) {
      var { data: perms } = await client
        .from('retest_permissions').select('id')
        .eq('user_id', CURRENT_USER).eq('test_set_id', setId)
        .is('used_at', null).limit(1);
      if (perms && perms.length > 0) {
        await client.from('retest_permissions')
          .update({ used_at: new Date().toISOString() }).eq('id', perms[0].id);
        return true;
      }
      return false;
    }

    // ============================================
    // 問題を描画する
    // ============================================
    function renderQuestions(disabled) {
      var area = document.getElementById('questions-area');
      var html = QUESTIONS.map(function(q, idx) {
        var typeLabel = q.type === 'choice' ? '4択' : (q.type === 'truefalse' ? '○×' : '記述');
        var typeCls   = 'type-' + q.type;

        var bodyHtml = '';
        if (q.type === 'choice') {
          bodyHtml = '<div class="choices" id="q-choices-' + q.id + '">' +
            q.choices.map(function(c) {
              return '<label class="choice"><input type="radio" name="q-' + q.id + '" value="' + c.id + '" ' +
                (disabled ? 'disabled' : 'onchange="setAnswer(' + q.id + ', ' + c.id + ')"') +
                '> ' + escapeHtml(c.body) + '</label>';
            }).join('') + '</div>';
        } else if (q.type === 'truefalse') {
          bodyHtml = '<div class="truefalse" id="q-tf-' + q.id + '">' +
            '<button class="tf-btn maru" ' + (disabled ? 'disabled' : 'onclick="selectTF(this,' + q.id + ',\'maru\')"') + '>○ <span>正しい</span></button>' +
            '<button class="tf-btn batu" ' + (disabled ? 'disabled' : 'onclick="selectTF(this,' + q.id + ',\'batu\')"') + '>× <span>間違い</span></button>' +
          '</div>';
        } else {
          bodyHtml = '<div id="q-text-wrap-' + q.id + '">' +
            '<textarea class="text-input" id="q-text-' + q.id + '" placeholder="ここに回答を入力してください" ' +
              (disabled ? 'disabled' : 'oninput="setAnswer(' + q.id + ', this.value)"') + '></textarea>' +
            '<div class="text-hint">※ 記述式は管理者が採点します</div>' +
          '</div>';
        }

        return '<div class="question-card">' +
          '<div class="question-head">' +
            '<span class="q-number">問' + (idx + 1) + '</span>' +
            '<span class="q-type ' + typeCls + '">' + typeLabel + '</span>' +
            '<span class="q-point">' + q.point + '点</span>' +
          '</div>' +
          '<div class="question-body">' +
            '<div class="question-text">' + escapeHtml(q.question) + '</div>' +
            bodyHtml +
          '</div>' +
        '</div>';
      }).join('');
      area.innerHTML = html;

      if (!disabled) {
        document.getElementById('progress-wrap').style.display = 'block';
        document.getElementById('submit-area').style.display = 'block';
        updateProgress();
      }
    }

    function escapeHtml(s) {
      return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    // ============================================
    // 回答の記録と進捗更新
    // ============================================
    function setAnswer(qId, value) {
      if (typeof value === 'string' && value.trim() === '') {
        delete ANSWERS[qId];
      } else {
        ANSWERS[qId] = value;
      }
      updateProgress();
    }

    function selectTF(btn, qId, type) {
      var wrap = document.getElementById('q-tf-' + qId);
      wrap.querySelectorAll('.tf-btn').forEach(function(b) {
        b.classList.remove('selected-maru', 'selected-batu');
      });
      btn.classList.add('selected-' + type);
      setAnswer(qId, type);
    }

    function updateProgress() {
      var total = QUESTIONS.length;
      var answered = QUESTIONS.filter(function(q) {
        var v = ANSWERS[q.id];
        if (q.type === 'text') return typeof v === 'string' && v.trim().length > 0;
        return v !== undefined && v !== null;
      }).length;
      document.getElementById('progress-text').textContent = answered + ' / ' + total + ' 回答済み';
      document.getElementById('progress-bar').style.width = (total > 0 ? (answered / total * 100) : 0) + '%';
    }

    // ============================================
    // 提出
    // ============================================
    async function submitTest() {
      // 全問回答チェック
      var unanswered = QUESTIONS.filter(function(q) {
        var v = ANSWERS[q.id];
        if (q.type === 'text') return typeof v !== 'string' || v.trim().length === 0;
        return v === undefined || v === null;
      });
      if (unanswered.length > 0) {
        alert('未回答の問題があります（' + unanswered.length + '問）。すべて回答してから提出してください。');
        return;
      }

      // 既に提出済みなら送信不可（二重クリック・DevTools経由の再送信を防ぐ）
      if (SUBMITTED) { return; }

      document.getElementById('btn-submit').disabled = true;
      document.getElementById('loading').style.display = 'block';

      // 二重送信ガード①：未採点の記述式回答が残っている → 採点中なので送信不可
      var { data: dupTexts } = await client
        .from('text_answers').select('id')
        .eq('user_id', CURRENT_USER).eq('test_set_id', TEST_SET.id)
        .is('score', null).limit(1);
      if (dupTexts && dupTexts.length > 0) {
        document.getElementById('loading').style.display = 'none';
        alert('前回の回答が採点中のため、再受験できません。採点完了までお待ちください。');
        SUBMITTED = true;
        disableAllInputs();
        return;
      }

      // 二重送信ガード②：test_results が既に存在する場合、未使用の retest_permissions が無ければ送信不可
      var { data: existResults } = await client
        .from('test_results').select('id')
        .eq('user_id', CURRENT_USER).eq('test_set_id', TEST_SET.id).limit(1);
      if (existResults && existResults.length > 0) {
        var { data: unusedPerms } = await client
          .from('retest_permissions').select('id')
          .eq('user_id', CURRENT_USER).eq('test_set_id', TEST_SET.id)
          .is('used_at', null).limit(1);
        if (!unusedPerms || unusedPerms.length === 0) {
          document.getElementById('loading').style.display = 'none';
          alert('このテストは既に受験済みです。再試験には管理者の許可が必要です。');
          SUBMITTED = true;
          disableAllInputs();
          return;
        }
      }

      // 自動採点（choice / truefalse のみ）
      var autoScore = 0;
      var answersPayload = {};
      var hasText = false;

      QUESTIONS.forEach(function(q) {
        var v = ANSWERS[q.id];
        var correct = null;
        if (q.type === 'choice') {
          var correctId = (q.choices.find(function(c) { return c.is_correct; }) || {}).id;
          correct = (v === correctId);
          if (correct) autoScore += q.point;
        } else if (q.type === 'truefalse') {
          // ○× は choices テーブルには無いので、管理画面側の仕様に合わせて question 側に正解保持が必要になるが、
          // 既存スキーマでは choices を流用する。is_correct が付いた choice.body ('maru'/'batu') を正解とする。
          var tfCorrect = (q.choices.find(function(c) { return c.is_correct; }) || {}).body;
          correct = (v === tfCorrect);
          if (correct) autoScore += q.point;
        } else {
          hasText = true;
        }
        answersPayload[q.id] = { type: q.type, answer: v, correct: correct };
      });

      // 合否（表示用）
      //  ・記述式がある場合：最終合否は採点後に合計点で再計算されるため、ここでは暫定で false を保存
      //  　（passed が NOT NULL 制約でも insert が失敗しないようにする）
      //  ・記述式がない場合：この場で確定
      var passedStored = hasText ? false : (autoScore >= TEST_SET.pass_score);
      var isPendingAfterSubmit = hasText;

      // 結果表示（記述があるときは採点中）
      renderResult(autoScore, (!hasText && passedStored), isPendingAfterSubmit);
      disableAllInputs();
      revealCorrectness();

      // DB 保存
      var { error: err1 } = await client.from('test_results').insert({
        user_id:     CURRENT_USER,
        category:    CATEGORY.name,
        grade:       TEST_SET.grade,
        test_set_id: TEST_SET.id,
        score:       autoScore,
        passed:      passedStored,
        answers:     answersPayload
      });
      if (err1) {
        console.error('test_results 保存エラー:', err1.message);
        alert('テスト結果の保存に失敗しました。管理者に連絡してください。\n' + err1.message);
        return;
      }
      // 提出完了後は二度と送信できないようフラグを立てる
      SUBMITTED = true;

      // 記述式回答を question_id 単位で保存
      var textRows = QUESTIONS.filter(function(q) { return q.type === 'text'; }).map(function(q) {
        return {
          user_id:     CURRENT_USER,
          category:    CATEGORY.name,
          grade:       TEST_SET.grade,
          test_set_id: TEST_SET.id,
          question_id: q.id,
          question:    q.question,
          answer:      ANSWERS[q.id]
        };
      });
      if (textRows.length > 0) {
        var { error: err2 } = await client.from('text_answers').insert(textRows);
        if (err2) console.error('text_answers 保存エラー:', err2.message);
      }

      document.getElementById('loading').style.display = 'none';
      document.getElementById('btn-submit').textContent = '提出済み';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ============================================
    // 過去の結果表示
    // ============================================
    async function showPastResult(latest) {
      // 過去回答を各問題の UI に反映
      var answersMap = latest.answers || {};
      QUESTIONS.forEach(function(q) {
        var entry = answersMap[q.id];
        if (!entry) return;
        var v = entry.answer;
        if (q.type === 'choice') {
          var wrap = document.getElementById('q-choices-' + q.id);
          if (!wrap) return;
          wrap.querySelectorAll('.choice').forEach(function(label) {
            var input = label.querySelector('input');
            var val = parseInt(input.value);
            var c = q.choices.find(function(cc) { return cc.id === val; });
            if (c && c.is_correct) label.classList.add('correct');
            if (val === v) {
              input.checked = true;
              if (c && !c.is_correct) label.classList.add('wrong');
            }
          });
        } else if (q.type === 'truefalse') {
          var tfWrap = document.getElementById('q-tf-' + q.id);
          if (!tfWrap) return;
          var correctType = (q.choices.find(function(c) { return c.is_correct; }) || {}).body;
          tfWrap.querySelectorAll('.tf-btn').forEach(function(btn) {
            var type = btn.classList.contains('maru') ? 'maru' : 'batu';
            if (type === correctType) btn.classList.add('correct');
            else if (type === v) btn.classList.add('wrong');
          });
        } else {
          // text — 提出済みビュー
          var tw = document.getElementById('q-text-wrap-' + q.id);
          if (tw) {
            tw.innerHTML =
              '<div class="submitted-badge">提出済み</div>' +
              '<div class="text-submitted">' + escapeHtml(v || '') + '</div>' +
              '<div class="score-pending" id="q-text-score-' + q.id + '">採点待ちです。</div>';
          }
        }
      });

      // 記述式の採点取得
      var { data: texts } = await client
        .from('text_answers').select('question_id, score, graded_at')
        .eq('user_id', CURRENT_USER).eq('test_set_id', TEST_SET.id);

      var textScoreTotal = 0;
      var anyUngraded = false;
      (texts || []).forEach(function(t) {
        var scoreEl = document.getElementById('q-text-score-' + t.question_id);
        if (scoreEl) {
          if (t.score !== null && t.score !== undefined) {
            scoreEl.className = 'score-result';
            scoreEl.textContent = '採点結果：' + t.score + '点';
          } else {
            anyUngraded = true;
          }
        }
        if (t.score !== null && t.score !== undefined) textScoreTotal += t.score;
      });

      var hasText = QUESTIONS.some(function(q) { return q.type === 'text'; });
      var waiting = hasText && anyUngraded;
      var totalScore = latest.score + textScoreTotal;
      var finalPassed = totalScore >= TEST_SET.pass_score;

      renderResult(totalScore, finalPassed, waiting);
      document.getElementById('progress-wrap').style.display = 'none';
      document.getElementById('submit-area').style.display = 'none';
    }

    function renderResult(score, passed, waitingForText) {
      document.getElementById('result-score').innerHTML = score + '<span>点</span>' + (waitingForText ? '（記述式採点待ち）' : '');
      var badge = document.getElementById('result-badge');
      var msg   = document.getElementById('result-msg');
      if (waitingForText) {
        badge.textContent = '採点中';
        badge.className = 'result-badge';
        badge.style.background = '#fef3cd';
        badge.style.color = '#856404';
        msg.textContent = '選択式の点数は確定しています。記述式の採点後に合否が確定します。';
      } else {
        badge.textContent = passed ? '合格' : '未合格';
        badge.className = 'result-badge ' + (passed ? 'passed' : 'failed');
        badge.style.background = '';
        badge.style.color = '';
        msg.textContent = passed ? 'おめでとうございます！合格です。' : '惜しい！もう一度内容を見直してみましょう。';
      }
      document.getElementById('result-card').classList.add('show');
    }

    function disableAllInputs() {
      document.querySelectorAll('#questions-area input, #questions-area textarea, #questions-area .tf-btn').forEach(function(el) {
        el.disabled = true;
        if (el.onclick) el.onclick = null;
      });
      document.getElementById('btn-submit').disabled = true;
    }

    function revealCorrectness() {
      QUESTIONS.forEach(function(q) {
        var v = ANSWERS[q.id];
        if (q.type === 'choice') {
          var wrap = document.getElementById('q-choices-' + q.id);
          if (!wrap) return;
          wrap.querySelectorAll('.choice').forEach(function(label) {
            var input = label.querySelector('input');
            var val = parseInt(input.value);
            var c = q.choices.find(function(cc) { return cc.id === val; });
            if (c && c.is_correct) label.classList.add('correct');
            else if (val === v) label.classList.add('wrong');
          });
        } else if (q.type === 'truefalse') {
          var tfWrap = document.getElementById('q-tf-' + q.id);
          if (!tfWrap) return;
          var correctType = (q.choices.find(function(c) { return c.is_correct; }) || {}).body;
          tfWrap.querySelectorAll('.tf-btn').forEach(function(btn) {
            var type = btn.classList.contains('maru') ? 'maru' : 'batu';
            btn.classList.remove('selected-maru','selected-batu');
            if (type === correctType) btn.classList.add('correct');
            else if (type === v) btn.classList.add('wrong');
          });
        } else {
          var tw = document.getElementById('q-text-wrap-' + q.id);
          if (tw) {
            tw.innerHTML =
              '<div class="submitted-badge">提出済み</div>' +
              '<div class="text-submitted">' + escapeHtml(ANSWERS[q.id] || '') + '</div>' +
              '<div class="score-pending" id="q-text-score-' + q.id + '">採点待ちです。</div>';
          }
        }
      });
    }

    initUser();
  </script>
