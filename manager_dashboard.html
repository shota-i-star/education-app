<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ダッシュボード — AZism 教育進捗管理</title>
  <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "BIZ UDPGothic", "Hiragino Sans", sans-serif; background: #f0f4f8; color: #1a1a2e; font-size: 14px; }
    header { background: #495e9f; color: #fff; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
    header .app-name { font-size: 14px; opacity: 0.85; }
    header .user-info { display: flex; align-items: center; gap: 12px; font-size: 13px; }
    .role-badge { background: #bd3c40; color: #fff; font-size: 11px; padding: 2px 10px; border-radius: 20px; }
    .btn-logout { padding: 7px 16px; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.4); border-radius: 8px; color: #fff; font-size: 13px; cursor: pointer; font-family: "BIZ UDPGothic", sans-serif; transition: background 0.15s; }
    .btn-logout:hover { background: rgba(255,255,255,0.25); }
    .admin-link { display: inline-flex; align-items: center; gap: 5px; padding: 5px 14px; background: rgba(255,255,255,0.22); border: 1px solid rgba(255,255,255,0.55); border-radius: 6px; color: #fff; font-size: 12px; font-weight: 700; font-family: "BIZ UDPGothic", sans-serif; text-decoration: none; letter-spacing: 0.02em; transition: background 0.15s; }
    .admin-link:hover { background: rgba(255,255,255,0.38); text-decoration: none; }
    .notif-btn { position: relative; padding: 5px 14px; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.4); border-radius: 6px; color: #fff; font-size: 12px; cursor: pointer; font-family: "BIZ UDPGothic", sans-serif; }
    .notif-btn:hover { background: rgba(255,255,255,0.25); }
    .notif-badge { position: absolute; top: -6px; right: -6px; background: #bd3c40; color: #fff; font-size: 10px; font-weight: 700; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .gradeup-panel { display: none; background: #fff; border-radius: 12px; border: 1px solid #e5e7eb; padding: 20px 24px; margin-bottom: 24px; }
    .gradeup-panel.show { display: block; }
    .gradeup-panel h2 { font-size: 15px; font-weight: 700; margin-bottom: 16px; color: #495e9f; }
    main { max-width: 1000px; margin: 0 auto; padding: 24px 16px 60px; }
    h2 { font-size: 15px; font-weight: 700; margin-bottom: 14px; }
    .summary-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 24px; }
    .summary-card { background: #fff; border-radius: 12px; border: 1px solid #e5e7eb; padding: 18px 20px; }
    .summary-card .s-label { font-size: 12px; color: #6b7280; margin-bottom: 8px; }
    .summary-card .s-value { font-size: 26px; font-weight: 700; color: #495e9f; }
    .summary-card .s-value span { font-size: 14px; font-weight: 400; color: #6b7280; }
    .summary-card .s-sub { font-size: 12px; color: #9ca3af; margin-top: 4px; }
    .summary-card.accent .s-value { color: #bd3c40; }
    .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    .chart-card { background: #fff; border-radius: 12px; border: 1px solid #e5e7eb; padding: 20px 24px; }
    .chart-card canvas { max-height: 200px; }
    .view-tabs { display: flex; gap: 8px; margin-bottom: 14px; }
    .tab-btn { padding: 6px 16px; border-radius: 20px; border: 1.5px solid #e5e7eb; background: #fff; font-size: 13px; font-family: "BIZ UDPGothic", sans-serif; cursor: pointer; color: #6b7280; transition: all 0.15s; }
    .tab-btn.active { background: #495e9f; color: #fff; border-color: #495e9f; }
    .table-card { background: #fff; border-radius: 12px; border: 1px solid #e5e7eb; padding: 20px 24px; overflow-x: auto; }
    .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .table-header h2 { margin-bottom: 0; }
    .selected-summary { font-size: 12px; color: #6b7280; background: #f9fafb; border: 1px solid #e5e7eb; padding: 4px 12px; border-radius: 20px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 10px 12px; border-bottom: 2px solid #e5e7eb; color: #6b7280; font-weight: 700; white-space: nowrap; }
    td { padding: 11px 12px; border-bottom: 1px solid #f0f4f8; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f9fafb; }
    .progress-cell { display: flex; align-items: center; gap: 8px; }
    .mini-bar-bg { flex: 1; background: #e5e7eb; border-radius: 99px; height: 6px; min-width: 60px; }
    .mini-bar-fill { background: #495e9f; border-radius: 99px; height: 6px; }
    .progress-num { font-size: 12px; color: #6b7280; white-space: nowrap; }
    .area-tag { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; background: #f0f4f8; color: #495e9f; }
    .store-tag { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; background: #eef0fa; color: #495e9f; }
    .grade-pill { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 11px; background: #eef0fa; color: #495e9f; }
    .pass { color: #2e7d32; font-weight: 700; }
    .fail { color: #bd3c40; }
    .btn-detail { padding: 4px 12px; background: none; border: 1px solid #d1d5db; border-radius: 6px; font-size: 12px; color: #495e9f; cursor: pointer; font-family: "BIZ UDPGothic", sans-serif; }
    .btn-detail:hover { background: #eef0fa; border-color: #495e9f; }
    .btn { padding: 7px 16px; border-radius: 8px; font-size: 13px; font-family: "BIZ UDPGothic", sans-serif; cursor: pointer; border: none; }
    .btn-primary { background: #495e9f; color: #fff; }
    .btn-primary:hover { background: #3a4d86; }
    .btn-danger { background: none; border: 1px solid #e5e7eb; color: #bd3c40; }
    .btn-danger:hover { background: #fdf0f0; border-color: #bd3c40; }
    .btn-sm { padding: 4px 12px; font-size: 12px; }
    .loading-text { text-align: center; padding: 32px; color: #9ca3af; font-size: 13px; }
    .toast { position: fixed; bottom: 24px; right: 24px; background: #1a1a2e; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 200; }
    .toast.show { opacity: 1; }
    /* クリック展開行 */
    tr.expandable-row { cursor: pointer; }
    tr.expandable-row:hover td { background: #eef0fa !important; }
    tr.expandable-row td { transition: background 0.1s; }
    .expand-arrow { display: inline-block; font-size: 11px; color: #9ca3af; margin-left: 6px; transition: transform 0.2s; }
    .expand-arrow.open { transform: rotate(180deg); }
    /* メンバーサブテーブル */
    .sub-member-row { display: none; }
    .sub-member-row td { padding: 0; background: #f9fafb; }
    .sub-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .sub-table th { padding: 8px 12px 8px 28px; text-align: left; color: #6b7280; font-weight: 700; border-bottom: 1px solid #e5e7eb; background: #f0f4f8; white-space: nowrap; }
    .sub-table th:first-child { padding-left: 32px; }
    .sub-table td { padding: 10px 12px; border-bottom: 1px solid #f0f4f8; }
    .sub-table td:first-child { padding-left: 32px; }
    .sub-table tr:last-child td { border-bottom: none; }
    .sub-table tr:hover td { background: #eef0fa; }

    /* 2軸進捗バー */
    .dual-progress { display: flex; flex-direction: column; gap: 4px; min-width: 160px; }
    .dual-progress-row { display: flex; align-items: center; gap: 6px; }
    .dual-label { font-size: 10px; color: #9ca3af; white-space: nowrap; width: 34px; flex-shrink: 0; text-align: right; }
    .mini-bar-fill-gray { background: #b0b8c8; border-radius: 99px; height: 6px; }
  </style>
</head>
<body>
  <header>
    <span class="app-name">AZism 教育進捗管理</span>
    <div class="user-info">
      <span class="role-badge" id="role-badge">MG</span>
      <span id="header-name">読み込み中...</span>
      <button class="notif-btn" onclick="toggleGradeupPanel()">
        🔔 昇級申請
        <span class="notif-badge" id="notif-badge" style="display:none">0</span>
      </button>
      <a href="admin.html" class="admin-link" id="admin-link" style="display:none">⚙️ 管理画面</a>
      <button class="btn-logout" onclick="logout()">ログアウト</button>
    </div>
  </header>

  <main>
    <!-- 昇級申請パネル -->
    <div class="gradeup-panel" id="gradeup-panel">
      <h2>🎉 昇級申請一覧</h2>
      <div id="gradeup-list"><div class="loading-text">読み込み中...</div></div>
    </div>

    <!-- サマリー -->
    <div class="summary-grid">
      <div class="summary-card">
        <div class="s-label">メンバー数</div>
        <div class="s-value" id="s-total">－ <span>名</span></div>
        <div class="s-sub">ロール：member</div>
      </div>
      <div class="summary-card">
        <div class="s-label">平均進捗率（全体）</div>
        <div class="s-value" id="s-progress-all">－ <span>%</span></div>
        <div class="s-sub">部署全カテゴリの平均</div>
      </div>
      <div class="summary-card">
        <div class="s-label">平均進捗率（現等級）</div>
        <div class="s-value" id="s-progress">－ <span>%</span></div>
        <div class="s-sub">各メンバーの現在等級の平均</div>
      </div>
      <div class="summary-card">
        <div class="s-label">テスト平均点</div>
        <div class="s-value" id="s-score">－ <span>点</span></div>
        <div class="s-sub">合格基準：80点</div>
      </div>
      <div class="summary-card accent">
        <div class="s-label">未合格者数</div>
        <div class="s-value" id="s-failed">－ <span>名</span></div>
        <div class="s-sub">フォローが必要</div>
      </div>
    </div>

    <!-- グラフ -->
    <div class="chart-grid">
      <div class="chart-card"><h2>エリア別 平均進捗率</h2><canvas id="chart-area"></canvas></div>
      <div class="chart-card"><h2>店舗別 平均進捗率</h2><canvas id="chart-store"></canvas></div>
    </div>

    <!-- 進捗率 -->
    <div class="table-card">
      <div class="table-header">
        <h2>進捗率</h2>
        <div style="display:flex;gap:8px;align-items:center;">
          <div class="view-tabs">
            <button class="tab-btn" onclick="setTab(this,'area')">エリア別</button>
            <button class="tab-btn" onclick="setTab(this,'store')">店舗別</button>
            <button class="tab-btn" onclick="setTab(this,'grade')">等級別</button>
            <button class="tab-btn active" onclick="setTab(this,'member')">個人別</button>
          </div>
          <span class="selected-summary" id="tab-summary">読み込み中...</span>
        </div>
      </div>
      <div id="table-area" style="display:none"><div id="area-table-body"><div class="loading-text">読み込み中...</div></div></div>
      <div id="table-store" style="display:none"><div id="store-table-body"><div class="loading-text">読み込み中...</div></div></div>
      <div id="table-grade" style="display:none"><div id="grade-table-body"><div class="loading-text">読み込み中...</div></div></div>
      <div id="table-member"><div id="member-table-body"><div class="loading-text">読み込み中...</div></div></div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    var SUPABASE_URL = 'https://rkclfgpewmjdluwufjng.supabase.co';
    var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJrY2xmZ3Bld21qZGx1d3Vmam5nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2MDIwOTcsImV4cCI6MjA5MTE3ODA5N30.ZoW7JExgrie14EEBgCOipy1QIRHCuzd8KKOS6v37nRg';
    var client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: { persistSession: true }
    });

    // ログインユーザーの役割・部署ID・絞り込み対象メンバーIDを保持するグローバル変数
    // dept_admin でログインした場合にだけ使用する
    var currentRole = null;       // 例: 'dept_admin', 'manager_admin' など
    var currentDeptId = null;     // dept_admin の department_id
    var allowedMemberIds = null;  // null = 全員表示 / 配列 = 絞り込み対象のみ

    // ============================================
    // ログイン確認
    // ============================================
    async function initUser() {
      var { data: { session } } = await client.auth.getSession();
      if (!session) { window.location.href = 'login.html'; return; }

      // department_id も取得する（dept_admin のフィルタに使う）
      var { data: profiles } = await client
        .from('user_profiles').select('name, role, department_id').eq('id', session.user.id).limit(1);

      if (!profiles || profiles.length === 0) { window.location.href = 'login.html'; return; }

      var profile = profiles[0];
      currentRole   = profile.role;
      currentDeptId = profile.department_id;

      document.getElementById('header-name').textContent = profile.name;
      var roleLabels = { 'manager': 'MG', 'manager_admin': '全権管理者', 'dept_admin': '部署管理者' };
      document.getElementById('role-badge').textContent = roleLabels[profile.role] || 'MG';
      if (profile.role === 'dept_admin' || profile.role === 'manager_admin') {
        document.getElementById('admin-link').style.display = 'inline-flex';
      }

      // dept_admin の場合: loadDashboard でメンバーIDを確定させてから昇級申請を読み込む
      if (currentRole === 'dept_admin') {
        await loadDashboard();
        loadGradeupRequests();
      } else {
        loadDashboard();
        loadGradeupRequests();
      }
    }

    async function logout() {
      await client.auth.signOut();
      window.location.href = 'login.html';
    }

    // ============================================
    // 昇級申請
    // ============================================
    async function loadGradeupRequests() {
      var gradeupQuery = client
        .from('grade_up_requests')
        .select('id, member_id, member_name, current_grade, requested_at')
        .eq('status', 'pending')
        .order('requested_at', { ascending: false });

      // dept_admin の場合は自部署メンバーの申請のみ表示する
      if (currentRole === 'dept_admin' && allowedMemberIds !== null) {
        if (allowedMemberIds.length === 0) {
          // 対象メンバーが0名なら何もしない
          document.getElementById('notif-badge').style.display = 'none';
          return;
        }
        gradeupQuery = gradeupQuery.in('member_id', allowedMemberIds);
      }

      var { data: requests } = await gradeupQuery;

      var count = (requests || []).length;
      var badge = document.getElementById('notif-badge');
      if (count > 0) {
        badge.style.display = 'flex';
        badge.textContent = count;
      } else {
        badge.style.display = 'none';
      }

      var panel = document.getElementById('gradeup-panel');
      if (!panel.classList.contains('show')) return;

      if (!requests || requests.length === 0) {
        document.getElementById('gradeup-list').innerHTML =
          '<div style="font-size:13px;color:#9ca3af;text-align:center;padding:20px">現在の申請はありません</div>';
        return;
      }

      var rows = requests.map(function(r) {
        var date = new Date(r.requested_at).toLocaleDateString('ja-JP');
        var nextGrade = r.current_grade + 1;
        return '<tr>' +
          '<td>' + r.member_name + '</td>' +
          '<td>' + r.current_grade + '等級 → <strong>' + nextGrade + '等級</strong></td>' +
          '<td>' + date + '</td>' +
          '<td><div style="display:flex;gap:8px">' +
            '<button class="btn btn-primary btn-sm" onclick="approveGradeup(' + r.id + ',\'' + r.member_id + '\',' + nextGrade + ')">承認</button>' +
            '<button class="btn btn-danger btn-sm" onclick="rejectGradeup(' + r.id + ')">却下</button>' +
          '</div></td>' +
        '</tr>';
      }).join('');

      document.getElementById('gradeup-list').innerHTML =
        '<table><thead><tr><th>名前</th><th>等級変更</th><th>申請日</th><th></th></tr></thead>' +
        '<tbody>' + rows + '</tbody></table>';
    }

    function toggleGradeupPanel() {
      var panel = document.getElementById('gradeup-panel');
      panel.classList.toggle('show');
      if (panel.classList.contains('show')) loadGradeupRequests();
    }

    async function approveGradeup(requestId, memberId, nextGrade) {
      if (!confirm('等級アップを承認しますか？')) return;
      await client.from('user_profiles').update({ grade: nextGrade }).eq('id', memberId);
      await client.from('grade_up_requests').update({
        status: 'approved', resolved_at: new Date().toISOString()
      }).eq('id', requestId);
      showToast('承認しました！' + nextGrade + '等級に昇格しました ✓');
      loadGradeupRequests();
      loadDashboard();
    }

    async function rejectGradeup(requestId) {
      if (!confirm('却下しますか？')) return;
      await client.from('grade_up_requests').update({
        status: 'rejected', resolved_at: new Date().toISOString()
      }).eq('id', requestId);
      showToast('却下しました');
      loadGradeupRequests();
    }

    // ============================================
    // ダッシュボードデータ読み込み
    // ============================================
    async function loadDashboard() {
      // メンバー取得クエリを組み立てる（dept_admin の場合は自部署に絞り込む）
      var membersQuery = client.from('user_profiles').select('id, name, grade, store, area, department_id').eq('role', 'member');

      if (currentRole === 'dept_admin' && currentDeptId) {
        // ステップ1: 自部署に所属するエリアのIDを取得
        var { data: deptAreas } = await client.from('areas').select('id').eq('department_id', currentDeptId);
        var deptAreaIds = (deptAreas || []).map(function(a) { return a.id; });

        if (deptAreaIds.length === 0) {
          // 対象エリアがなければ空で表示して終了
          allowedMemberIds = [];
          renderMemberTable([]); renderAreaTable([]); renderStoreTable([]); renderGradeTable([]); renderSummary([]); renderCharts([]);
          return;
        }

        // ステップ2: そのエリアに属する店舗名を取得
        var { data: deptStores } = await client.from('stores').select('name').in('area_id', deptAreaIds);
        var deptStoreNames = (deptStores || []).map(function(s) { return s.name; });

        if (deptStoreNames.length === 0) {
          // 対象店舗がなければ空で表示して終了
          allowedMemberIds = [];
          renderMemberTable([]); renderAreaTable([]); renderStoreTable([]); renderGradeTable([]); renderSummary([]); renderCharts([]);
          return;
        }

        // ステップ3: 対象店舗に所属するメンバーのみ取得するよう絞り込む
        membersQuery = membersQuery.in('store', deptStoreNames);
      }

      var { data: members, error: memberError } = await membersQuery;

      if (memberError || !members) { console.error('メンバー取得エラー:', memberError); return; }

      // 昇級申請フィルタ用に取得したメンバーIDを保持する
      allowedMemberIds = members.map(function(m) { return m.id; });

      var { data: items }    = await client.from('check_items').select('id, grade, category_id');
      var { data: steps }    = await client.from('check_steps').select('id, item_id');
      var { data: checks }   = await client.from('check_progress').select('user_id, step_id').not('step_id', 'is', null);
      var { data: catDepts } = await client.from('category_departments').select('category_id, department_id');
      var { data: results }    = await client.from('test_results').select('user_id, score, passed').order('taken_at', { ascending: false });
      var { data: textScores } = await client.from('text_answers').select('user_id, score').not('score', 'is', null);

      var memberData = members.map(function(m) {
        // ── 現等級進捗率 ──────────────────────────────
        var gradeItems   = (items || []).filter(function(i) { return i.grade === m.grade; });
        var gradeStepIds = (steps || [])
          .filter(function(s) { return gradeItems.some(function(i) { return i.id === s.item_id; }); })
          .map(function(s) { return s.id; });
        var checkedGrade = (checks || []).filter(function(c) {
          return c.user_id === m.id && gradeStepIds.indexOf(c.step_id) !== -1;
        }).length;
        var progress = gradeStepIds.length > 0 ? Math.round(checkedGrade / gradeStepIds.length * 100) : 0;

        // ── 全体進捗率（その部署の全カテゴリ・全等級のステップ） ──
        var deptCatIds    = (catDepts || [])
          .filter(function(cd) { return cd.department_id === m.department_id; })
          .map(function(cd) { return cd.category_id; });
        var allDeptItems  = (items || []).filter(function(i) { return deptCatIds.indexOf(i.category_id) !== -1; });
        var allDeptStepIds = (steps || [])
          .filter(function(s) { return allDeptItems.some(function(i) { return i.id === s.item_id; }); })
          .map(function(s) { return s.id; });
        var checkedAll = (checks || []).filter(function(c) {
          return c.user_id === m.id && allDeptStepIds.indexOf(c.step_id) !== -1;
        }).length;
        var progressAll = allDeptStepIds.length > 0 ? Math.round(checkedAll / allDeptStepIds.length * 100) : 0;

        var latestResult = (results || []).find(function(r) { return r.user_id === m.id; });
        var textScore    = (textScores || []).find(function(t) { return t.user_id === m.id; });
        var autoScore    = latestResult ? latestResult.score : null;
        var descScore    = textScore ? textScore.score : null;
        var totalScore   = autoScore !== null ? (descScore !== null ? autoScore + descScore : autoScore) : null;
        var passed       = totalScore !== null ? totalScore >= 80 : null;

        return { id: m.id, name: m.name, grade: m.grade,
          store: m.store || '未設定', area: m.area || '未設定',
          progress: progress, progressAll: progressAll,
          score: totalScore, passed: passed };
      });

      renderMemberTable(memberData);
      renderAreaTable(memberData);
      renderStoreTable(memberData);
      renderGradeTable(memberData);
      renderSummary(memberData);
      renderCharts(memberData);
    }

    // ============================================
    // 2軸進捗バー HTML を生成
    // ============================================
    function dualProgressCell(progressAll, progressGrade) {
      return '<div class="dual-progress">' +
        '<div class="dual-progress-row">' +
          '<span class="dual-label">全体</span>' +
          '<div class="mini-bar-bg"><div class="mini-bar-fill mini-bar-fill-gray" style="width:' + progressAll + '%"></div></div>' +
          '<span class="progress-num">' + progressAll + '%</span>' +
        '</div>' +
        '<div class="dual-progress-row">' +
          '<span class="dual-label">現等級</span>' +
          '<div class="mini-bar-bg"><div class="mini-bar-fill" style="width:' + progressGrade + '%"></div></div>' +
          '<span class="progress-num">' + progressGrade + '%</span>' +
        '</div>' +
      '</div>';
    }

    // ============================================
    // テーブル描画
    // ============================================
    function renderMemberTable(memberData) {
      if (memberData.length === 0) {
        document.getElementById('member-table-body').innerHTML = '<div class="loading-text">メンバーが登録されていません</div>';
        return;
      }
      var rows = memberData.map(function(m) {
        var scoreText = m.score !== null ? m.score + '点' : '未受験';
        var passText  = m.passed === null ? '－' : m.passed ? '<span class="pass">合格</span>' : '<span class="fail">未合格</span>';
        return '<tr>' +
          '<td>' + m.name + '</td>' +
          '<td><span class="area-tag">' + m.area + '</span></td>' +
          '<td><span class="store-tag">' + m.store + '</span></td>' +
          '<td><span class="grade-pill">' + m.grade + '等級</span></td>' +
          '<td>' + dualProgressCell(m.progressAll, m.progress) + '</td>' +
          '<td>' + scoreText + '</td><td>' + passText + '</td>' +
          '<td><button class="btn-detail" onclick="openDetail(\'' + m.id + '\')">詳細</button></td>' +
        '</tr>';
      }).join('');
      document.getElementById('member-table-body').innerHTML =
        '<table><thead><tr><th>名前</th><th>エリア</th><th>店舗</th><th>等級</th><th>進捗率（全体 / 現等級）</th><th>テスト点数</th><th>合否</th><th></th></tr></thead><tbody>' + rows + '</tbody></table>';
    }

    // クリックで展開・折りたたむユーティリティ
    function toggleExpand(expandRowId) {
      var el = document.getElementById(expandRowId);
      if (!el) return;
      var arrow = document.getElementById('arr-' + expandRowId);
      var isOpen = el.style.display !== 'none';
      el.style.display = isOpen ? 'none' : 'table-row';
      if (arrow) {
        if (isOpen) arrow.classList.remove('open');
        else        arrow.classList.add('open');
      }
    }

    // メンバーのサブテーブル HTML を生成
    function renderMembersSubTable(members) {
      if (!members || members.length === 0) {
        return '<div style="padding:12px 32px;color:#9ca3af;font-size:13px">メンバーがいません</div>';
      }
      var rows = members.map(function(m) {
        var scoreText = m.score !== null ? m.score + '点' : '未受験';
        var passText  = m.passed === null ? '－'
          : m.passed ? '<span class="pass">合格</span>'
                     : '<span class="fail">未合格</span>';
        return '<tr>' +
          '<td>' + m.name + '</td>' +
          '<td><span class="grade-pill">' + m.grade + '等級</span></td>' +
          '<td>' + dualProgressCell(m.progressAll, m.progress) + '</td>' +
          '<td>' + scoreText + '</td>' +
          '<td>' + passText + '</td>' +
          '<td><button class="btn-detail" onclick="event.stopPropagation();openDetail(\'' + m.id + '\')">詳細</button></td>' +
        '</tr>';
      }).join('');
      return '<table class="sub-table">' +
        '<thead><tr><th>名前</th><th>等級</th><th>進捗率（全体 / 現等級）</th><th>テスト点数</th><th>合否</th><th></th></tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
      '</table>';
    }

    function renderAreaTable(memberData) {
      var areaMap = {};
      memberData.forEach(function(m) {
        var a = m.area || '未設定';
        if (!areaMap[a]) areaMap[a] = [];
        areaMap[a].push(m);
      });
      var idx = 0;
      var rows = Object.keys(areaMap).map(function(area) {
        var ms        = areaMap[area];
        var avgP      = Math.round(ms.reduce(function(s,m){return s+m.progress;},0)/ms.length);
        var avgPAll   = Math.round(ms.reduce(function(s,m){return s+(m.progressAll||0);},0)/ms.length);
        var tested    = ms.filter(function(m){return m.score!==null;});
        var avgS      = tested.length>0 ? Math.round(tested.reduce(function(s,m){return s+m.score;},0)/tested.length) : null;
        var failed    = ms.filter(function(m){return m.passed===false;}).length;
        var storeSet  = {};
        ms.forEach(function(m){ storeSet[m.store||'未設定']=true; });
        var rowId = 'area-sub-' + (idx++);
        return '<tr class="expandable-row" onclick="toggleExpand(\'' + rowId + '\')">' +
          '<td><span class="area-tag">' + area + '</span><span class="expand-arrow" id="arr-' + rowId + '">▾</span></td>' +
          '<td>' + Object.keys(storeSet).length + '店舗</td>' +
          '<td>' + ms.length + '名</td>' +
          '<td>' + dualProgressCell(avgPAll, avgP) + '</td>' +
          '<td>' + (avgS!==null?avgS+'点':'未受験') + '</td>' +
          '<td class="' + (failed>0?'fail':'pass') + '">' + failed + '名</td>' +
        '</tr>' +
        '<tr id="' + rowId + '" class="sub-member-row"><td colspan="6">' +
          renderMembersSubTable(ms) +
        '</td></tr>';
      }).join('');
      document.getElementById('area-table-body').innerHTML =
        '<table><thead><tr><th>エリア</th><th>店舗数</th><th>メンバー数</th><th>平均進捗率（全体 / 現等級）</th><th>テスト平均点</th><th>未合格者</th></tr></thead><tbody>' + rows + '</tbody></table>';
    }

    function renderStoreTable(memberData) {
      var storeMap = {};
      memberData.forEach(function(m) {
        var s = m.store || '未設定';
        if (!storeMap[s]) storeMap[s] = { members: [], area: m.area };
        storeMap[s].members.push(m);
      });
      var idx = 0;
      var rows = Object.keys(storeMap).map(function(store) {
        var ms     = storeMap[store].members;
        var area   = storeMap[store].area || '未設定';
        var avgP    = Math.round(ms.reduce(function(s,m){return s+m.progress;},0)/ms.length);
        var avgPAll = Math.round(ms.reduce(function(s,m){return s+(m.progressAll||0);},0)/ms.length);
        var tested  = ms.filter(function(m){return m.score!==null;});
        var avgS    = tested.length>0 ? Math.round(tested.reduce(function(s,m){return s+m.score;},0)/tested.length) : null;
        var failed  = ms.filter(function(m){return m.passed===false;}).length;
        var rowId   = 'store-sub-' + (idx++);
        return '<tr class="expandable-row" onclick="toggleExpand(\'' + rowId + '\')">' +
          '<td><span class="area-tag">' + area + '</span></td>' +
          '<td><span class="store-tag">' + store + '</span><span class="expand-arrow" id="arr-' + rowId + '">▾</span></td>' +
          '<td>' + ms.length + '名</td>' +
          '<td>' + dualProgressCell(avgPAll, avgP) + '</td>' +
          '<td>' + (avgS!==null?avgS+'点':'未受験') + '</td>' +
          '<td class="' + (failed>0?'fail':'pass') + '">' + failed + '名</td>' +
        '</tr>' +
        '<tr id="' + rowId + '" class="sub-member-row"><td colspan="6">' +
          renderMembersSubTable(ms) +
        '</td></tr>';
      }).join('');
      document.getElementById('store-table-body').innerHTML =
        '<table><thead><tr><th>エリア</th><th>店舗</th><th>メンバー数</th><th>平均進捗率（全体 / 現等級）</th><th>テスト平均点</th><th>未合格者</th></tr></thead><tbody>' + rows + '</tbody></table>';
    }

    function renderGradeTable(memberData) {
      if (memberData.length === 0) {
        document.getElementById('grade-table-body').innerHTML = '<div class="loading-text">メンバーが登録されていません</div>';
        return;
      }
      var gradeMap = {};
      memberData.forEach(function(m) {
        var g = m.grade != null ? m.grade : '未設定';
        if (!gradeMap[g]) gradeMap[g] = [];
        gradeMap[g].push(m);
      });
      var grades = Object.keys(gradeMap).sort(function(a, b) { return Number(a) - Number(b); });
      var idx = 0;
      var rows = grades.map(function(grade) {
        var ms      = gradeMap[grade];
        var avgP    = Math.round(ms.reduce(function(s,m){return s+m.progress;},0)/ms.length);
        var avgPAll = Math.round(ms.reduce(function(s,m){return s+(m.progressAll||0);},0)/ms.length);
        var tested  = ms.filter(function(m){return m.score!==null;});
        var avgS    = tested.length>0 ? Math.round(tested.reduce(function(s,m){return s+m.score;},0)/tested.length) : null;
        var failed  = ms.filter(function(m){return m.passed===false;}).length;
        var rowId   = 'grade-sub-' + (idx++);
        return '<tr class="expandable-row" onclick="toggleExpand(\'' + rowId + '\')">' +
          '<td><span class="grade-pill">' + grade + '等級</span><span class="expand-arrow" id="arr-' + rowId + '">▾</span></td>' +
          '<td>' + ms.length + '名</td>' +
          '<td>' + dualProgressCell(avgPAll, avgP) + '</td>' +
          '<td>' + (avgS!==null?avgS+'点':'未受験') + '</td>' +
          '<td class="' + (failed>0?'fail':'pass') + '">' + failed + '名</td>' +
        '</tr>' +
        '<tr id="' + rowId + '" class="sub-member-row"><td colspan="5">' +
          renderGradeSubTable(ms) +
        '</td></tr>';
      }).join('');
      document.getElementById('grade-table-body').innerHTML =
        '<table><thead><tr><th>等級</th><th>メンバー数</th><th>平均進捗率（全体 / 現等級）</th><th>テスト平均点</th><th>未合格者</th></tr></thead><tbody>' + rows + '</tbody></table>';
    }

    function renderGradeSubTable(members) {
      if (!members || members.length === 0) {
        return '<div style="padding:12px 32px;color:#9ca3af;font-size:13px">メンバーがいません</div>';
      }
      var rows = members.map(function(m) {
        var scoreText = m.score !== null ? m.score + '点' : '未受験';
        var passText  = m.passed === null ? '－'
          : m.passed ? '<span class="pass">合格</span>'
                     : '<span class="fail">未合格</span>';
        return '<tr>' +
          '<td>' + m.name + '</td>' +
          '<td><span class="area-tag">' + m.area + '</span></td>' +
          '<td><span class="store-tag">' + m.store + '</span></td>' +
          '<td>' + dualProgressCell(m.progressAll, m.progress) + '</td>' +
          '<td>' + scoreText + '</td>' +
          '<td>' + passText + '</td>' +
          '<td><button class="btn-detail" onclick="event.stopPropagation();openDetail(\'' + m.id + '\')">詳細</button></td>' +
        '</tr>';
      }).join('');
      return '<table class="sub-table">' +
        '<thead><tr><th>名前</th><th>エリア</th><th>店舗</th><th>進捗率（全体 / 現等級）</th><th>テスト点数</th><th>合否</th><th></th></tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
        '</table>';
    }

    function renderSummary(memberData) {
      var total = memberData.length;
      var avgProgress    = total > 0 ? Math.round(memberData.reduce(function(s,m){return s+m.progress;},0)/total) : 0;
      var avgProgressAll = total > 0 ? Math.round(memberData.reduce(function(s,m){return s+(m.progressAll||0);},0)/total) : 0;
      var testedMembers = memberData.filter(function(m){return m.score!==null;});
      var avgScore = testedMembers.length > 0 ? Math.round(testedMembers.reduce(function(s,m){return s+m.score;},0)/testedMembers.length) : 0;
      var failedCount = memberData.filter(function(m){return m.passed===false;}).length;
      document.getElementById('s-total').innerHTML        = total + ' <span>名</span>';
      document.getElementById('s-progress-all').innerHTML = avgProgressAll + ' <span>%</span>';
      document.getElementById('s-progress').innerHTML     = avgProgress + ' <span>%</span>';
      document.getElementById('s-score').innerHTML        = (testedMembers.length>0?avgScore:'－') + ' <span>点</span>';
      document.getElementById('s-failed').innerHTML       = failedCount + ' <span>名</span>';
      document.getElementById('tab-summary').textContent =
        total + '名 ／ 全体進捗 ' + avgProgressAll + '% ／ 現等級進捗 ' + avgProgress + '% ／ 平均点 ' + (testedMembers.length>0?avgScore:'－') + '点';
    }

    function openDetail(userId) { window.location.href = 'member_detail.html?id=' + userId; }

    function setTab(btn, type) {
      document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
      btn.classList.add('active');
      document.getElementById('table-area').style.display   = type==='area'   ? 'block' : 'none';
      document.getElementById('table-store').style.display  = type==='store'  ? 'block' : 'none';
      document.getElementById('table-grade').style.display  = type==='grade'  ? 'block' : 'none';
      document.getElementById('table-member').style.display = type==='member' ? 'block' : 'none';
    }

    function renderCharts(memberData) {
      var areaMap = {};
      memberData.forEach(function(m) {
        if (!areaMap[m.area]) areaMap[m.area] = { total: 0, count: 0 };
        areaMap[m.area].total += m.progress; areaMap[m.area].count++;
      });
      var areaLabels = Object.keys(areaMap);
      var areaData   = areaLabels.map(function(a){return Math.round(areaMap[a].total/areaMap[a].count);});

      var storeMap = {};
      memberData.forEach(function(m) {
        if (!storeMap[m.store]) storeMap[m.store] = { total: 0, count: 0 };
        storeMap[m.store].total += m.progress; storeMap[m.store].count++;
      });
      var storeLabels = Object.keys(storeMap);
      var storeData   = storeLabels.map(function(s){return Math.round(storeMap[s].total/storeMap[s].count);});

      new Chart(document.getElementById('chart-area').getContext('2d'), {
        type: 'bar',
        data: { labels: areaLabels, datasets: [{ data: areaData, backgroundColor: '#495e9f', borderRadius: 6 }] },
        options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, max: 100, ticks: { callback: function(v){return v+'%';} } } } }
      });
      new Chart(document.getElementById('chart-store').getContext('2d'), {
        type: 'bar',
        data: { labels: storeLabels, datasets: [{ data: storeData, backgroundColor: '#495e9f', borderRadius: 6 }] },
        options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, max: 100, ticks: { callback: function(v){return v+'%';} } } } }
      });
    }

    function showToast(msg) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(function(){t.classList.remove('show');}, 2500);
    }

    initUser();
  </script>
</body>
</html>
